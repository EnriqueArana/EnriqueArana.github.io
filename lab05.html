<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles/lab05.css">
    </head>
    <body>
        <section>
            <h1>LAB 05: TALLER DE JAVASCRIPT</h1>
            <div class="container1">
                <div id="seccion-datos1">
                    <label for="fname" class="texto-plano" id="caja1">Apellidos y Nombres: </label>
                    <input type="text" placeholder="Ingreso de Apellidos y Nombres" id="fname" name="fname" /><br />
                </div>
                <div id="seccion-datos2">
                    <label for="fdate" class="texto-plano" id="caja2">Fecha de Nacimiento: </label>
                    <input type="date" placeholder="Ingreso de Fecha de Nacimiento" id="fdate" name="fpass" /><br />
                </div>
            </div>
            <div class="container2">
                <button id="btnextraer">Extraer</button>
                <button id="btncolorear">Colorear</button>
            </div>
            <div class="container3">
                <div id="seccion-datos3">
                    <label for="fpat" class="texto-plano" id="caja3">Apellido Paterno: </label>
                    <input type="text" id="fpat" name="fpat" readonly="readonly"/><br />
                </div>
                <div id="seccion-datos4">
                    <label for="fmat" class="texto-plano" id="caja4">Apellido Materno: </label>
                    <input type="text" id="fmat" name="fmat" readonly="readonly"/><br />
                </div>
                <div id="seccion-datos5">
                    <label for="fnom" class="texto-nombres" id="caja5">Nombres: </label>
                    <input type="text" id="fnom" name="fnom" readonly="readonly" />
                </div>
            </div>
            <div class="container4">
                <div id="seccion-datos6">
                    <label for="flon" id="longitudapellido">Longitud del Apellido: </label>
                    <input type="text" id="flon" name="flon" readonly="readonly"/><br />
                </div>
                <div id="seccion-datos7">
                    <label for="fage" id="edad">Edad: </label>
                    <input type="text" id="fage" name="fage" readonly="readonly"/><br />
                </div>
                <div id="seccion-datos8">
                    <label for="fletter" id="mesletras">Mes en letras: </label>
                    <input type="text" id="fletter" name="fletter" readonly="readonly"/>
                </div>
            </div>
        </section>

        <script src="js/lab05.js" async defer></script>
    </body>
</html>
